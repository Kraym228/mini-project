name: UI Tests

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  ui-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout gh-pages branch (for Allure history)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: ./.github/gh-pages
        continue-on-error: true

      - name: Create allure-results directory
        run: mkdir -p allure-results

      - name: Copy Allure history from previous runs (if exists)
        run: |
          if [ -d "./.github/gh-pages/history" ]; then
            cp -r ./.github/gh-pages/history allure-results/
            echo "History copied"
          else
            echo "No previous history found (first run)"
          fi

      - name: Run UI-tests via docker-compose
        env:
          LOGIN: ${{ secrets.LOGIN }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          docker compose up --exit-code-from regression || true

      - name: Debug - Check if allure-results exists
        run: |
          echo "=== Checking allure-results ==="
          ls -la allure-results/ || echo "allure-results not found"

      - name: Install Allure on runner
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget -O allure-2.30.0.tgz https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.30.0/allure-commandline-2.30.0.tgz
          sudo tar -zxvf allure-2.30.0.tgz -C /opt/
          sudo ln -s /opt/allure-2.30.0/bin/allure /usr/bin/allure
          allure --version

      - name: Generate Allure report
        run: |
          allure generate allure-results --clean -o allure-report
          echo "=== Checking allure-report after generation ==="
          ls -la allure-report/

      - name: Prepare gh-pages directory
        run: |
          mkdir -p ./.github/gh-pages
          cp -r allure-report/* ./.github/gh-pages/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@4.1.5
        with:
          token: ${{ secrets.CI_TOKEN }}
          branch: gh-pages
          folder: ./.github/gh-pages
          clean: true