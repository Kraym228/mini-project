name: UI Tests

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  ui-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout gh-pages branch (for Allure history)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: ./.github/gh-pages
        continue-on-error: true

      - name: Create directories for Allure
        run: |
          mkdir -p allure-results
          mkdir -p allure-report

      - name: Copy Allure history from previous runs
        run: |
          if [ -d "./.github/gh-pages/history" ]; then
            cp -r ./.github/gh-pages/history allure-results/
            echo "History copied from previous run"
          else
            echo "No previous history found (first run)"
          fi

      - name: Run UI-tests via docker-compose
        run: |
          export LOGIN="${{ secrets.LOGIN }}"
          export PASSWORD="${{ secrets.PASSWORD }}"
          docker compose up --exit-code-from regression || true

      - name: Debug - Show allure-results content
        run: |
          echo "=== allure-results contains: ==="
          ls -la allure-results/ || echo "allure-results not found"

      - name: Install Allure on runner
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget -O allure-2.30.0.tgz https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.30.0/allure-commandline-2.30.0.tgz
          sudo tar -zxvf allure-2.30.0.tgz -C /opt/
          sudo ln -s /opt/allure-2.30.0/bin/allure /usr/bin/allure
          allure --version

      - name: Generate Allure report
        run: |
          allure generate allure-results --clean -o allure-report
          echo "=== allure-report contains: ==="
          ls -la allure-report/

      - name: Prepare files for GitHub Pages
        run: |
          mkdir -p ./.github/gh-pages
          cp -r allure-report/* ./.github/gh-pages/
          echo "Files copied to gh-pages directory"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.7.3
        with:
          token: ${{ secrets.CI_TOKEN }}
          branch: gh-pages
          folder: ./.github/gh-pages
          clean: true